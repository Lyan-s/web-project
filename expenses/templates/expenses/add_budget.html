{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Add Budget</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-outline-info">Save Budget</button>
    <a href="{% url 'budget_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
