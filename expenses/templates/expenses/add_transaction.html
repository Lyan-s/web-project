{% extends 'base.html' %}

{% block title %}Add Transaction{% endblock %}

{% block content %}
<h2 class="mb-4">Add Transaction</h2>

<p><a href="{% url 'add_category' %}?next=add_transaction" target="_blank">+ Add new category</a></p>

<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
