{% extends 'base.html' %}

{% block title %}Edit Transaction{% endblock %}

{% block content %}
<h2 class="mb-4">Edit Transaction</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
