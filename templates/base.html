{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Smart Expense Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'styles/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('select').forEach(function(select) {
                new Choices(select, {
                    searchEnabled: false,
                    itemSelectText: '',
                });
            });
        });
    </script>


    <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="bi bi-graph-up-arrow text-info"></i> Smart Expense Tracker
        </a>

        <div class="ms-auto d-flex align-items-center gap-2">
            {% if user.is_authenticated %}
                <a class="nav-link-btn" href="{% url 'dashboard' %}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a class="nav-link-btn" href="{% url 'transaction_list' %}">
                    <i class="bi bi-list-ul"></i> Transactions
                </a>
                <a class="nav-link-btn" href="{% url 'reports' %}">
                    <i class="bi bi-bar-chart-line"></i> Reports
                </a>
                <a class="nav-link-btn" href="{% url 'budget_list' %}">
                    <i class="bi bi-wallet2"></i> Budgets
                </a>
                <a class="nav-link-btn text-danger-link" href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
                <a href="{% url 'profile' %}" class="navbar-avatar" title="{{ user.username }}">
                    {{ user.username|first|upper }}
                </a>
            {% else %}
                <a class="nav-link-btn" href="{% url 'login' %}">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </a>
                <a class="nav-link-btn" href="{% url 'register' %}">
                    <i class="bi bi-person-plus"></i> Register
                </a>
            {% endif %}
        </div>
    </nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
