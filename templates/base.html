{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Smart Expense Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body {
        background-color: #eef2f7;
    }

    .hero-bg {
        background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("{% static 'images/hero-bg.jpg' %}");
        background-size: cover;
        background-position: center;
        color: white;
        padding: 60px 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="{% url 'home' %}">Smart Expense Tracker</a>
    {% if user.is_authenticated %}
        <div>
            <a class="btn btn-outline-light btn-sm" href="{% url 'dashboard' %}">Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'transaction_list' %}">Transactions</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'reports' %}">Reports</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Logout</a>
        </div>
    {% endif %}
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
